name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: shellcheck
        run: shellcheck build.sh tests/run-tests.sh
      - name: run tests
        run: bash tests/run-tests.sh
