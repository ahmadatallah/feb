name: bump-homebrew-formula

# Updates Formula/feb.rb in ahmadatallah/homebrew-tap on every release.
# Requires the TAP_GITHUB_TOKEN secret: a fine-grained PAT with
# contents:write on the homebrew-tap repo.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to sync to the tap (e.g. v1.1.2)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: feb
          formula-path: Formula/feb.rb
          homebrew-tap: ahmadatallah/homebrew-tap
          download-url: https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.event.release.tag_name || inputs.tag }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
